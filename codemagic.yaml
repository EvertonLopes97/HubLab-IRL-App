# =====================================================================
# HubLab IRL — fork do Moblin, buildado SEM MAC
#
# Coloque este arquivo na RAIZ do SEU fork do Moblin.
# Coloque tambem a pasta branding/ (com icon.png) na raiz.
#
# O que ele faz:
#   1. cria o Config/User.xcconfig (o Moblin exige, e nao vem no repo)
#   2. troca o icone e o nome do app pela sua marca
#   3. compila sem assinatura e empacota o .ipa
#
# Voce assina depois no Windows com o Sideloadly + Apple ID gratis.
# =====================================================================

workflows:
  hublab-irl:
    name: HubLab IRL (fork Moblin)
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      xcode: latest

    scripts:
      - name: Criar User.xcconfig (obrigatorio no Moblin)
        script: |
          # O Moblin nao versiona este arquivo — cada fork cria o seu.
          # DEVELOPMENT_TEAM fica VAZIO porque buildamos sem assinatura.
          # CAPABILITIES=free usa entitlements que dispensam conta paga.
          cat > Config/User.xcconfig << 'EOF'
          DEVELOPMENT_TEAM =
          BASE_PRODUCT_BUNDLE_IDENTIFIER = agency.hublab.irl
          CAPABILITIES = free
          EOF
          echo "--- User.xcconfig ---"
          cat Config/User.xcconfig

      - name: Aplicar a marca HubLab
        script: |
          # Icone: e um unico PNG 1024x1024 chamado logo-square.png
          if [ -f branding/icon.png ]; then
            cp branding/icon.png "Moblin/Assets.xcassets/AppIcon.appiconset/logo-square.png"
            echo "icone HubLab aplicado"
          else
            echo "AVISO: branding/icon.png nao encontrado, mantendo icone original"
          fi

          # Nome embaixo do icone no iPhone
          sed -i '' 's/INFOPLIST_KEY_CFBundleDisplayName = Moblin;/INFOPLIST_KEY_CFBundleDisplayName = "HubLab IRL";/g' Moblin.xcodeproj/project.pbxproj
          echo "--- nomes de exibicao ---"
          grep -c 'CFBundleDisplayName = "HubLab IRL"' Moblin.xcodeproj/project.pbxproj || true

      - name: Compilar sem assinatura
        script: |
          # IMPORTANTE: usar -destination, NAO -sdk iphoneos.
          # O Moblin tem um app de Apple Watch. Com -sdk iphoneos o Xcode
          # forca TODOS os targets para iPhone, e o Watch acaba tentando
          # gerar o mesmo Moblin.app do app principal:
          #   "error: Multiple commands produce .../Moblin.app"
          # Com -destination generic/platform=iOS cada target usa o SDK
          # correto (o Watch vai para watchOS e e embutido).
          xcodebuild \
            -project Moblin.xcodeproj \
            -scheme Moblin \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/dd \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            build
          echo "--- procurando o .app gerado ---"
          find build/dd/Build/Products -maxdepth 2 -name "*.app" -type d

      - name: DIAGNOSTICO - o que o Xcode gerou
        script: |
          echo "########## TODOS OS PRODUTOS ##########"
          find build/dd/Build/Products -maxdepth 3 | head -40
          echo ""
          echo "########## TODOS OS .app ##########"
          find build/dd/Build -name "*.app" -type d 2>/dev/null | head -20
          echo ""
          echo "########## ONDE HA Info.plist ##########"
          find build/dd/Build -name "Info.plist" -path "*.app/*" 2>/dev/null | head -10
        ignore_failure: true

      - name: Empacotar .ipa
        script: |
          # Pega o .app do iPhone e CONFERE que ele esta completo antes de
          # empacotar. O erro "no item named Payload/Moblin.app/Info.plist"
          # no Sideloadly significa app incompleto — melhor descobrir aqui.
          APP=$(find build/dd/Build/Products -maxdepth 2 -name "Moblin.app" -type d \
                | grep -i iphoneos | head -1)

          if [ -z "$APP" ]; then
            echo "ERRO: nao achei Moblin.app em Release-iphoneos. Existentes:"
            find build/dd/Build -name "*.app" -type d
            exit 1
          fi

          echo "==> Candidato: $APP"
          echo "--- conteudo ---"
          ls -la "$APP"

          if [ ! -f "$APP/Info.plist" ]; then
            echo ""
            echo "ERRO: este .app NAO tem Info.plist — esta incompleto."
            echo "Procurando um .app completo em outro lugar..."
            for c in $(find build/dd/Build -name "*.app" -type d); do
              if [ -f "$c/Info.plist" ]; then
                echo "  COMPLETO: $c"
              else
                echo "  incompleto: $c"
              fi
            done
            exit 1
          fi

          echo "==> OK: Info.plist presente. Empacotando."
          rm -rf build/ipa
          mkdir -p build/ipa/Payload
          cp -R "$APP" build/ipa/Payload/
          cd build/ipa
          zip -qr HubLabIRL.ipa Payload
          rm -rf Payload
          echo "--- confere o que entrou no .ipa ---"
          unzip -l HubLabIRL.ipa | head -12
          ls -la

    artifacts:
      - build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - evertonmendeslopes97@gmail.com
        notify:
          success: true
          failure: true
